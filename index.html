<script type="application/ld+json">
{
  "@context": "https://schema.org",

  "mainEntity": [
    {
      "@type": "Question",
      "name": "¿Qué hace KA Estudio?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "KA Estudio es una agencia chilena de contenido audiovisual para redes sociales y gestión de paid media. Producimos video vertical (reels, stories y anuncios) y gestionamos campañas en Meta, TikTok y Google Ads con foco en performance."
      }
    },
    {
      "@type": "Question",
      "name": "¿Dónde está KA Estudio?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Estamos en Santiago, Chile, y trabajamos con marcas de todo el país."
      }
    },
    {
      "@type": "Question",
      "name": "¿Qué incluye el Plan Mensual?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Producción de contenido vertical mensual, gestión de campañas en Meta, TikTok y Google Ads, community management, calendario de contenido y un análisis mensual con métricas y plan de mejora."
      }
    },
    {
      "@type": "Question",
      "name": "¿Con qué tipo de marcas trabajan?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Hemos trabajado con marcas de gastronomía, retail, automotriz, inmobiliaria y belleza, entre otras. Adaptamos el contenido y la estrategia a cada industria."
      }
    },
    {
      "@type": "Question",
      "name": "¿Hacen producciones puntuales o solo planes mensuales?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Ambos. Además del Plan Mensual, hacemos producciones puntuales para campañas, lanzamientos y eventos, y contenido audiovisual corporativo para empresas."
      }
    },
    {
      "@type": "Question",
      "name": "¿Cómo puedo cotizar?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Escríbenos por el formulario de contacto o por Instagram. Te respondemos en menos de 24 horas con una propuesta a tu medida."
      }
    }
  ]
}
